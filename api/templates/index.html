<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Marketing Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page">
    <div class="card">
        <div class="header">
            <h1>📊 Term Deposit Predictor</h1>
            <p>Enter client and campaign details</p>
        </div>

        <form action="/predict" method="post">
            <div class="form-grid">

                <div class="field">
                    <input type="number" name="age" min="18" max="100" required placeholder=" ">
                    <label>Age</label>
                </div>

                <div class="field">
                    <select name="job" required>
                        <option value="" disabled selected></option>
                        <option value="admin.">Admin.</option>
                        <option value="blue-collar">Blue-collar</option>
                        <option value="entrepreneur">Entrepreneur</option>
                        <option value="housemaid">Housemaid</option>
                        <option value="management">Management</option>
                        <option value="retired">Retired</option>
                        <option value="self-employed">Self-employed</option>
                        <option value="services">Services</option>
                        <option value="student">Student</option>
                        <option value="technician">Technician</option>
                        <option value="unemployed">Unemployed</option>
                        <option value="unknown">Unknown</option>
                    </select>
                    <label>Job</label>
                </div>

                <div class="field">
                    <select name="marital" required>
                        <option value="" disabled selected></option>
                        <option value="divorced">Divorced</option>
                        <option value="married">Married</option>
                        <option value="single">Single</option>
                        <option value="unknown">Unknown</option>
                    </select>
                    <label>Marital</label>
                </div>

                <div class="field">
                    <select name="education" required>
                        <option value="" disabled selected></option>
                        <option value="basic.4y">Basic 4y</option>
                        <option value="basic.6y">Basic 6y</option>
                        <option value="basic.9y">Basic 9y</option>
                        <option value="high.school">High School</option>
                        <option value="illiterate">Illiterate</option>
                        <option value="professional.course">Professional Course</option>
                        <option value="university.degree">University Degree</option>
                        <option value="unknown">Unknown</option>
                    </select>
                    <label>Education</label>
                </div>

                <div class="field">
                    <select name="default" required>
                        <option value="" disabled selected></option>
                        <option value="no">No</option>
                        <option value="yes">Yes</option>
                        <option value="unknown">Unknown</option>
                    </select>
                    <label>Default</label>
                </div>

                <div class="field">
                    <select name="housing" required>
                        <option value="" disabled selected></option>
                        <option value="no">No</option>
                        <option value="yes">Yes</option>
                        <option value="unknown">Unknown</option>
                    </select>
                    <label>Housing Loan</label>
                </div>

                <div class="field">
                    <select name="loan" required>
                        <option value="" disabled selected></option>
                        <option value="no">No</option>
                        <option value="yes">Yes</option>
                        <option value="unknown">Unknown</option>
                    </select>
                    <label>Personal Loan</label>
                </div>

                <div class="field">
                    <select name="contact" required>
                        <option value="" disabled selected></option>
                        <option value="cellular">Cellular</option>
                        <option value="telephone">Telephone</option>
                    </select>
                    <label>Contact Type</label>
                </div>

                <div class="field">
                    <select name="month" required>
                        <option value="" disabled selected></option>
                        <option value="jan">January</option>
                        <option value="feb">February</option>
                        <option value="mar">March</option>
                        <option value="apr">April</option>
                        <option value="may">May</option>
                        <option value="jun">June</option>
                        <option value="jul">July</option>
                        <option value="aug">August</option>
                        <option value="sep">September</option>
                        <option value="oct">October</option>
                        <option value="nov">November</option>
                        <option value="dec">December</option>
                    </select>
                    <label>Month</label>
                </div>

                <div class="field">
                    <select name="day_of_week" required>
                        <option value="" disabled selected></option>
                        <option value="mon">Monday</option>
                        <option value="tue">Tuesday</option>
                        <option value="wed">Wednesday</option>
                        <option value="thu">Thursday</option>
                        <option value="fri">Friday</option>
                    </select>
                    <label>Day of Week</label>
                </div>

                <div class="field">
                    <input type="number" name="duration" min="0" required placeholder=" ">
                    <label>Duration (seconds)</label>
                </div>

                <div class="field">
                    <input type="number" name="campaign" min="1" required placeholder=" ">
                    <label>Campaign (contacts)</label>
                </div>

                <div class="field">
                    <input type="number" name="pdays" min="0" required placeholder=" ">
                    <label>Pdays (days since last contact)</label>
                </div>

                <div class="field">
                    <input type="number" name="previous" min="0" required placeholder=" ">
                    <label>Previous contacts</label>
                </div>

                <div class="field">
                    <select name="poutcome" required>
                        <option value="" disabled selected></option>
                        <option value="failure">Failure</option>
                        <option value="nonexistent">Nonexistent</option>
                        <option value="success">Success</option>
                    </select>
                    <label>Previous outcome</label>
                </div>

                <div class="field">
                    <input type="number" step="0.01" name="emp.var.rate" required placeholder=" ">
                    <label>Employment variation rate</label>
                </div>

                <div class="field">
                    <input type="number" step="0.01" name="cons.price.idx" required placeholder=" ">
                    <label>Consumer price index</label>
                </div>

                <div class="field">
                    <input type="number" step="0.01" name="cons.conf.idx" required placeholder=" ">
                    <label>Consumer confidence index</label>
                </div>

                <div class="field">
                    <input type="number" step="0.01" name="euribor3m" required placeholder=" ">
                    <label>Euribor 3 month rate</label>
                </div>

                <div class="field">
                    <input type="number" step="0.01" name="nr.employed" required placeholder=" ">
                    <label>Number employed</label>
                </div>

            </div>

            <button type="submit" class="btn-primary">
                Predict Subscription
            </button>
        </form>
    </div>
</div>

</body>
</html>
